<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pulse Abidjan — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Pulse Abidjan</h1>
      <p class="tag">Le dashboard matinal pour tout Abidjanais qui trade</p>
    </div>
  </header>

  <main class="container grid">
    <section class="card weather" id="weather">
      <h2>Météo du jour</h2>
      <div class="content">
        <div class="left">
          <div class="weather-main">
            <div class="icon" id="weather-icon">
              <!-- svg placeholder; will be replaced by JS -->
              <svg id="icon-sun" width="44" height="44" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="12" cy="12" r="4" fill="#FFD54A"/><g stroke="#FFB300" stroke-width="1.2"><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.2 4.2l1.4 1.4"/><path d="M18.4 18.4l1.4 1.4"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.2 19.8l1.4-1.4"/><path d="M18.4 5.6l1.4-1.4"/></g></svg>
            </div>
            <div>
              <div class="temp" id="weather-temp">—</div>
              <div id="weather-desc">Chargement…</div>
            </div>
          </div>
        </div>
        <div class="right" id="weather-extra"> </div>
      </div>
    </section>

    <section class="card rates" id="rates">
      <h2>Taux de change</h2>
      <div class="rates-list">
        <div>USD → XOF: <strong id="usd-xof">—</strong></div>
        <div>EUR → XOF: <strong id="eur-xof">—</strong></div>
      </div>
    </section>

    <section class="card news" id="news">
      <h2>Actualités</h2>
      <ul id="news-list"> <li>Chargement…</li> </ul>
    </section>

    <!-- Tip culturel removed as requested -->
  </main>

  <footer class="site-footer">
  <div class="container">Données: Open-Meteo · exchangerate.host · RSS</div>
  </footer>

  <script src="js/app.js" type="module"></script>
</body>
</html>
